name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "PDF-Ters-Cevirici" app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Ters-Cevirici-Windows
          path: dist/PDF-Ters-Cevirici.exe
